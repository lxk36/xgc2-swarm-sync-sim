name: ci

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Build and install-check deb packages in Docker
        run: |
          set -euo pipefail
          export PACKAGE_VERSION="$(sed -nE 's|^version:[[:space:]]*([^[:space:]#]+).*|\1|p' .xgc2/product.yml | head -n1)"
          .xgc2/scripts/build_debs_in_docker.sh \
            --work-dir "$RUNNER_TEMP/swarm-sync-sim-${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-swarm-sync-sim-debs-${{ matrix.arch }}
          path: debs/*.deb

name: release

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Expected .xgc2/product.yml version
        required: true
        type: string
      expected_source_sha:
        description: Expected source commit SHA
        required: true
        type: string
      prepare_action:
        description: Release-train action
        required: false
        default: release
        type: choice
        options:
          - release
          - compatibility-verify
      apt_overlay_url:
        description: Optional release-scoped staging APT base URL
        required: false
        default: ""
        type: string
      dependency_set_digest:
        description: SHA256 of the resolved release-train dependency set
        required: false
        default: ""
        type: string
      run_cpp_quality:
        description: Run C++ quality checks
        required: true
        default: false
        type: boolean
      run_source_tests:
        description: Run source tests
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

defaults:
  run:
    shell: bash

env:
  XGC2_APT_OVERLAY_URL: ${{ inputs.apt_overlay_url }}
  XGC2_DEPENDENCY_SET_DIGEST: ${{ inputs.dependency_set_digest }}

jobs:
  prepare-contract:
    name: Validate prepare contract
    runs-on: ubuntu-latest
    steps:
      - name: Validate release-train inputs
        env:
          PREPARE_ACTION: ${{ inputs.prepare_action }}
          APT_OVERLAY_URL: ${{ inputs.apt_overlay_url }}
          DEPENDENCY_SET_DIGEST: ${{ inputs.dependency_set_digest }}
        run: |
          set -euo pipefail
          case "$PREPARE_ACTION" in
            release|compatibility-verify) ;;
            *)
              echo "unsupported prepare_action: $PREPARE_ACTION" >&2
              exit 1
              ;;
          esac
          if [[ -n "$DEPENDENCY_SET_DIGEST" && ! "$DEPENDENCY_SET_DIGEST" =~ ^[0-9a-f]{64}$ ]]; then
            echo "dependency_set_digest must be empty or 64 lowercase hex characters" >&2
            exit 1
          fi
          if [[ -n "$APT_OVERLAY_URL" && ! "$DEPENDENCY_SET_DIGEST" =~ ^[0-9a-f]{64}$ ]]; then
            echo "apt_overlay_url requires a dependency_set_digest" >&2
            exit 1
          fi

  validate-release-inputs:
    needs: prepare-contract
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.product.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate expected version and source SHA
        id: product
        run: |
          set -euo pipefail
          version="$(sed -nE 's|^version:[[:space:]]*([^[:space:]#]+).*|\1|p' .xgc2/product.yml | head -n1)"
          if [[ -z "${version}" ]]; then
            echo "::error::missing version in .xgc2/product.yml"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [[ "${version}" != "${{ inputs.expected_version }}" ]]; then
            echo "::error::product.yml version ${version} does not match expected_version ${{ inputs.expected_version }}"
            exit 1
          fi
          source_sha="$(git rev-parse HEAD)"
          if [[ "${source_sha}" != "${{ inputs.expected_source_sha }}" ]]; then
            echo "::error::HEAD ${source_sha} does not match expected_source_sha ${{ inputs.expected_source_sha }}"
            exit 1
          fi

  package-compliance:
    needs: validate-release-inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check packaging metadata and scripts
        run: |
          set -euo pipefail
          git diff --check HEAD
          bash -n .xgc2/scripts/*.sh

  cpp-quality:
    if: ${{ inputs.run_cpp_quality }}
    needs: validate-release-inputs
    runs-on: ubuntu-latest
    steps:
      - name: No standalone C++ quality gate
        run: echo "No standalone C++ quality gate is configured for swarm-sync-sim."

  source-tests:
    if: ${{ inputs.run_source_tests }}
    needs: validate-release-inputs
    runs-on: ubuntu-latest
    steps:
      - name: Source tests covered by package build
        run: echo "Source and install checks run as part of the deb build."

  build:
    needs: validate-release-inputs
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      PACKAGE_VERSION: ${{ needs.validate-release-inputs.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Build and install-check deb packages in Docker
        run: |
          .xgc2/scripts/build_debs_in_docker.sh \
            --work-dir "$RUNNER_TEMP/swarm-sync-sim-${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Create release-train build manifest
        run: |
          python3 .xgc2/scripts/xgc2_artifact_manifest.py build \
            --deb-dir debs \
            --output-dir .ci/build-manifests \
            --product xgc2-swarm-sync-sim \
            --product-version "${{ inputs.expected_version }}" \
            --distribution focal \
            --architecture "${{ matrix.arch }}" \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --ci-run-id "$GITHUB_RUN_ID" \
            --ci-workflow "$GITHUB_WORKFLOW" \
            --ci-workflow-ref "$GITHUB_WORKFLOW_REF"

      - name: Upload deb artifacts
        if: ${{ inputs.prepare_action == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-swarm-sync-sim-release-debs-${{ matrix.arch }}
          path: |
            debs/*.deb
            .ci/build-manifests/*.json
          retention-days: 14
          include-hidden-files: true

name: release

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Expected .xgc2/product.yml version
        required: true
        type: string
      expected_source_sha:
        description: Expected source commit SHA
        required: true
        type: string
      publish_apt:
        description: Publish built debs to the XGC2 APT repository
        required: true
        default: false
        type: boolean
      run_cpp_quality:
        description: Run C++ quality checks
        required: true
        default: false
        type: boolean
      run_source_tests:
        description: Run source tests
        required: true
        default: false
        type: boolean
      release_id:
        description: Parent orchestrator run id used for correlation and audit
        required: false
        default: ""
        type: string
      release_lock_digest:
        description: SHA256 of the immutable release lock
        required: false
        default: ""
        type: string
      trusted_ci_run_id:
        description: Exact successful push CI run whose trusted deb artifacts may be reused
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate-release-inputs:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.product.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate expected version and source SHA
        id: product
        run: |
          set -euo pipefail
          version="$(sed -nE 's|^version:[[:space:]]*([^[:space:]#]+).*|\1|p' .xgc2/product.yml | head -n1)"
          if [[ -z "${version}" ]]; then
            echo "::error::missing version in .xgc2/product.yml"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [[ "${version}" != "${{ inputs.expected_version }}" ]]; then
            echo "::error::product.yml version ${version} does not match expected_version ${{ inputs.expected_version }}"
            exit 1
          fi
          source_sha="$(git rev-parse HEAD)"
          if [[ "${source_sha}" != "${{ inputs.expected_source_sha }}" ]]; then
            echo "::error::HEAD ${source_sha} does not match expected_source_sha ${{ inputs.expected_source_sha }}"
            exit 1
          fi

  package-compliance:
    needs: validate-release-inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check packaging metadata and scripts
        run: |
          set -euo pipefail
          git diff --check HEAD
          bash -n .xgc2/scripts/*.sh

  cpp-quality:
    if: ${{ inputs.run_cpp_quality }}
    needs: validate-release-inputs
    runs-on: ubuntu-latest
    steps:
      - name: No standalone C++ quality gate
        run: echo "No standalone C++ quality gate is configured for swarm-sync-sim."

  source-tests:
    if: ${{ inputs.run_source_tests }}
    needs: validate-release-inputs
    runs-on: ubuntu-latest
    steps:
      - name: Source tests covered by package build
        run: echo "Source and install checks run as part of the deb build."

  build:
    needs: validate-release-inputs
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      PACKAGE_VERSION: ${{ needs.validate-release-inputs.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Download trusted CI artifacts
        if: ${{ inputs.trusted_ci_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.trusted_ci_run_id }}
          name: xgc2-swarm-sync-sim-debs-${{ matrix.arch }}
          path: trusted

      - name: Verify and stage trusted CI artifacts
        if: ${{ inputs.trusted_ci_run_id != '' }}
        run: |
          python3 .xgc2/scripts/xgc2_artifact_manifest.py verify-build \
            --artifact-dir trusted \
            --deb-output-dir debs \
            --manifest-output-dir build-manifests \
            --product xgc2-swarm-sync-sim \
            --product-version "${{ inputs.expected_version }}" \
            --distribution focal \
            --architecture "${{ matrix.arch }}" \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --ci-run-id "${{ inputs.trusted_ci_run_id }}"

      - name: Build and install-check deb packages in Docker
        if: ${{ inputs.trusted_ci_run_id == '' }}
        run: |
          .xgc2/scripts/build_debs_in_docker.sh \
            --work-dir "$RUNNER_TEMP/swarm-sync-sim-${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Create fallback build manifest
        if: ${{ inputs.trusted_ci_run_id == '' }}
        run: |
          python3 .xgc2/scripts/xgc2_artifact_manifest.py build \
            --deb-dir debs \
            --output-dir build-manifests \
            --product xgc2-swarm-sync-sim \
            --product-version "${{ inputs.expected_version }}" \
            --distribution focal \
            --architecture "${{ matrix.arch }}" \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --ci-run-id "$GITHUB_RUN_ID" \
            --ci-workflow "$GITHUB_WORKFLOW" \
            --ci-workflow-ref "$GITHUB_WORKFLOW_REF"

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-swarm-sync-sim-release-debs-${{ matrix.arch }}
          path: |
            debs/*.deb
            build-manifests/*.json
          retention-days: 14
          include-hidden-files: true

  publish-apt:
    if: >-
      ${{ always() && inputs.publish_apt
          && needs.validate-release-inputs.result == 'success'
          && needs.package-compliance.result == 'success'
          && (needs.cpp-quality.result == 'success' || needs.cpp-quality.result == 'skipped')
          && (needs.source-tests.result == 'success' || needs.source-tests.result == 'skipped')
          && needs.build.result == 'success' }}
    needs:
      - validate-release-inputs
      - package-compliance
      - cpp-quality
      - source-tests
      - build
    runs-on: ubuntu-latest
    concurrency:
      group: xgc2-apt-focal
      cancel-in-progress: false
    env:
      APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
      APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
      APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
      APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}
      APT_REPO_DISTRIBUTION: focal
    steps:
      - uses: actions/checkout@v4

      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xgc2-swarm-sync-sim-release-debs-*
          path: release-input
          merge-multiple: true

      - name: Validate artifacts and create release manifests
        run: |
          python3 .xgc2/scripts/xgc2_artifact_manifest.py verify-build \
            --artifact-dir release-input \
            --deb-output-dir staged/debs \
            --manifest-output-dir staged/build-manifests \
            --product xgc2-swarm-sync-sim \
            --product-version "${{ inputs.expected_version }}" \
            --distribution focal \
            --source-sha "${{ inputs.expected_source_sha }}"
          python3 .xgc2/scripts/xgc2_artifact_manifest.py release \
            --deb-dir staged/debs \
            --build-manifest-dir staged/build-manifests \
            --publish-dir publish \
            --product xgc2-swarm-sync-sim \
            --product-version "${{ inputs.expected_version }}" \
            --distribution focal \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --release-id "${{ inputs.release_id || github.run_id }}" \
            --release-lock-digest "${{ inputs.release_lock_digest }}" \
            --target-architecture amd64 \
            --target-architecture arm64

      - name: Publish to self-hosted APT repository
        run: |
          set -euo pipefail
          test -n "${APT_REPO_HOST}"
          test -n "${APT_REPO_SSH_KEY}"
          test -n "${APT_REPO_KNOWN_HOSTS}"
          export APT_REPO_PORT="${APT_REPO_PORT:-22}"
          .xgc2/scripts/publish_apt_repo.sh --deb-dir publish

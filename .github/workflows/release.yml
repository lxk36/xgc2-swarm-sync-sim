name: release

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Expected .xgc2/product.yml version
        required: true
        type: string
      expected_source_sha:
        description: Expected source commit SHA
        required: true
        type: string
      publish_apt:
        description: Publish built debs to the XGC2 APT repository
        required: true
        default: false
        type: boolean
      run_cpp_quality:
        description: Run C++ quality checks
        required: true
        default: false
        type: boolean
      run_source_tests:
        description: Run source tests
        required: true
        default: false
        type: boolean

defaults:
  run:
    shell: bash

jobs:
  validate-release-inputs:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.product.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate expected version and source SHA
        id: product
        run: |
          set -euo pipefail
          version="$(sed -nE 's|^version:[[:space:]]*([^[:space:]#]+).*|\1|p' .xgc2/product.yml | head -n1)"
          if [[ -z "${version}" ]]; then
            echo "::error::missing version in .xgc2/product.yml"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [[ "${version}" != "${{ inputs.expected_version }}" ]]; then
            echo "::error::product.yml version ${version} does not match expected_version ${{ inputs.expected_version }}"
            exit 1
          fi
          source_sha="$(git rev-parse HEAD)"
          if [[ "${source_sha}" != "${{ inputs.expected_source_sha }}" ]]; then
            echo "::error::HEAD ${source_sha} does not match expected_source_sha ${{ inputs.expected_source_sha }}"
            exit 1
          fi

  cpp-quality:
    if: ${{ inputs.run_cpp_quality }}
    needs: validate-release-inputs
    runs-on: ubuntu-latest
    steps:
      - name: No standalone C++ quality gate
        run: echo "No standalone C++ quality gate is configured for swarm-sync-sim."

  source-tests:
    if: ${{ inputs.run_source_tests }}
    needs: validate-release-inputs
    runs-on: ubuntu-latest
    steps:
      - name: Source tests covered by package build
        run: echo "Source and install checks run as part of the deb build."

  build:
    needs: validate-release-inputs
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      PACKAGE_VERSION: ${{ needs.validate-release-inputs.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Build and install-check deb packages in Docker
        run: |
          .xgc2/scripts/build_debs_in_docker.sh \
            --work-dir "$RUNNER_TEMP/swarm-sync-sim-${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-swarm-sync-sim-release-debs-${{ matrix.arch }}
          path: debs/*.deb

  publish-apt:
    if: ${{ inputs.publish_apt }}
    needs: build
    runs-on: ubuntu-latest
    env:
      APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
      APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
      APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
      APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}
    steps:
      - uses: actions/checkout@v4

      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xgc2-swarm-sync-sim-release-debs-*
          path: debs
          merge-multiple: true

      - name: Publish to self-hosted APT repository
        run: |
          set -euo pipefail
          test -n "${APT_REPO_HOST}"
          test -n "${APT_REPO_SSH_KEY}"
          test -n "${APT_REPO_KNOWN_HOSTS}"
          export APT_REPO_PORT="${APT_REPO_PORT:-22}"
          .xgc2/scripts/publish_apt_repo.sh --deb-dir debs
